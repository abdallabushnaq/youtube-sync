# Build a GraalVM native image and upload it as a workflow artefact.
#
# Triggered on every push to main and on pull requests targeting main.
# Native binaries are built on Linux x86-64, macOS (arm64), and Windows x86-64
# using GraalVM Community Edition for JDK 25.
#
# NOTE: The Jetty-based OAuth callback server used on the first auth run is
# initialised at run time (--initialize-at-run-time flag in pom.xml native profile).
# If the native image fails to build due to additional initialisation issues,
# run the agent locally with -agentlib:native-image-agent to capture a full
# reflect-config.json and commit it under
# src/main/resources/META-INF/native-image/de.bushnaq.abdalla/youtube-sync/.

name: Native Image

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  native-image:
    name: Build native image (${{ matrix.label }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux x86-64
            artifact-name: youtube-sync-linux-x86_64
            binary: target/youtube-sync

          - os: macos-latest
            label: macOS arm64
            artifact-name: youtube-sync-macos-arm64
            binary: target/youtube-sync

          - os: windows-latest
            label: Windows x86-64
            artifact-name: youtube-sync-windows-x86_64
            binary: target/youtube-sync.exe

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up GraalVM CE for JDK 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          native-image-job-reports: 'true'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build native image
        run: mvn --batch-mode --no-transfer-progress -Pnative package -DskipTests

      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.binary }}
          if-no-files-found: error
          retention-days: 30
