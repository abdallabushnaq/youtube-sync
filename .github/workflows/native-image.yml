# Build the fat JAR and upload it as a workflow artifact.
#
# Triggered on every push to main and on pull requests targeting main.
# The JAR is self-contained — all dependencies are shaded in — and runs on
# any Java 25 JDK without GraalVM or native-image tooling.

name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build fat JAR
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Build fat JAR
        run: mvn --batch-mode --no-transfer-progress package -DskipTests

      - name: Upload fat JAR
        uses: actions/upload-artifact@v4
        with:
          name: youtube-sync
          path: target/youtube-sync.jar
          if-no-files-found: error
          retention-days: 30
